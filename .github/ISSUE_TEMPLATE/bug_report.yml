name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, what you got.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands or request payloads. Smaller is better.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python, torch, GPU and driver if relevant, commit hash.
    validations:
      required: true
