name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache scheduler Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scheduler -> target
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            core/uv.lock
            serve/uv.lock
      - name: Create Python 3.12 environment
        run: uv venv --python 3.12 --clear
      - name: Install real-engine test dependencies
        run: uv pip install -e "core[dev,engine]" -e "serve[dev]"
      - name: Build and install scheduler Python wheel
        run: |
          uv pip install maturin
          uv run maturin build -m scheduler/Cargo.toml --features python --release --out dist
          uv pip install dist/*.whl
      - name: Run core KV, kernel, and real-engine tests
        run: >-
          uv run --no-sync pytest -q -c core/pyproject.toml
          core/tests/kv core/tests/kernels core/tests/engine
      - name: Run serve TreeKV real-engine E2E test
        run: >-
          uv run --no-sync pytest -q -c serve/pyproject.toml
          serve/tests/test_treekv_e2e.py
      - name: Parse workflow YAML
        run: >-
          uv run --with pyyaml python -c
          "import pathlib,yaml; files=[pathlib.Path('.github/workflows/ci.yml'),pathlib.Path('.github/workflows/gpu-parity.yml')]; [yaml.safe_load(path.read_text(encoding='utf-8')) for path in files]; print('Parsed workflow YAML:', ', '.join(map(str, files)))"

  scheduler:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scheduler
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scheduler -> target
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run scheduler tests
        run: cargo test
      - name: Check Python bindings
        run: cargo check --features python

  serve:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect serve package
        id: serve
        shell: bash
        run: |
          if [[ -d serve ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::serve/ is absent; skipping the serve gate until that package merges."
          fi
      - name: Install uv
        if: steps.serve.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: serve/uv.lock
      - name: Create Python 3.12 environment
        if: steps.serve.outputs.present == 'true'
        working-directory: serve
        run: uv venv --python 3.12 --clear
      - name: Install serve development dependencies
        if: steps.serve.outputs.present == 'true'
        working-directory: serve
        run: uv pip install -e ".[dev]"
      - name: Run serve tests covered outside the real-engine gate
        if: steps.serve.outputs.present == 'true'
        working-directory: serve
        run: uv run --no-sync pytest -q --ignore=tests/test_treekv_e2e.py

  sdk:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: sdk/uv.lock
      - name: Create Python 3.12 environment
        working-directory: sdk
        run: uv venv --python 3.12 --clear
      - name: Install SDK test dependencies
        working-directory: sdk
        run: uv pip install -e . "hypothesis>=6.100,<7" "pytest>=8.2,<9"
      - name: Run SDK unit tests
        working-directory: sdk
        run: uv run --no-sync pytest -q --ignore=tests/test_server_contract.py

  wire-contract:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            sdk/uv.lock
            serve/uv.lock
      - name: Create Python 3.12 environment
        working-directory: sdk
        run: uv venv --python 3.12 --clear
      - name: Install real SDK and serve packages
        working-directory: sdk
        run: uv pip install -e . -e ../serve "pytest>=8.2,<9"
      - name: Run real serve to real SDK stream contract
        working-directory: sdk
        run: uv run --no-sync pytest -q tests/test_server_contract.py

  thoughtbench:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: thoughtbench/uv.lock
      - name: Create Python 3.12 environment
        working-directory: thoughtbench
        run: uv venv --python 3.12 --clear
      - name: Install ThoughtBench test dependencies
        working-directory: thoughtbench
        run: >-
          uv pip install -e . -e ../sdk -e ../serve
          "httpx>=0.28,<1" "pytest>=8.3,<9" "uvicorn>=0.34,<1"
      - name: Run ThoughtBench tests
        working-directory: thoughtbench
        run: uv run --no-sync pytest -q

  modeling:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache scheduler Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scheduler -> target
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: core/uv.lock
      - name: Create Python 3.12 environment
        run: uv venv --python 3.12 --clear
      - name: Install core modeling and engine dependencies
        run: uv pip install -e "core[dev,engine,modeling]"
      - name: Build and install scheduler Python wheel
        run: |
          uv pip install maturin
          uv run maturin build -m scheduler/Cargo.toml --features python --release --out dist
          uv pip install dist/*.whl
      - name: Run full core suite with modeling and real engine
        env:
          HF_HOME: ${{ runner.temp }}/huggingface
        run: uv run --no-sync pytest -q -c core/pyproject.toml core/tests
