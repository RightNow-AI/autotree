replicaCount: 1

image:
  repository: autotree
  tag: local
  pullPolicy: IfNotPresent
imagePullSecrets: []

engine: treekv
model: gpt2
kvPages: null
kvBranchHeadroom: 1.5
extraArgs: []

service:
  type: ClusterIP
  port: 80
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"

serviceMonitor:
  enabled: false
  interval: 15s
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: autotree.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  metricName: active_branches
  targetAverageValue: "4"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 1

enterprise:
  apiKeys:
    existingSecret: ""
    key: api-keys.json
  oidc:
    jwksUrl: ""
    issuer: ""
    audience: ""
    algorithms: RS256
  quotas: {}
  quotaWindowSeconds: 60
  audit:
    enabled: false
    path: /var/log/autotree/audit.jsonl
    persistence:
      enabled: false
      existingClaim: ""
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi

extraEnv: []
extraEnvFrom: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

hfCache:
  enabled: true
  emptyDir: {}

nameOverride: ""
fullnameOverride: ""
